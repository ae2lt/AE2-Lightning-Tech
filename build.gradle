plugins {
    id 'java-library'
    id 'maven-publish'
    id 'idea'
    id 'net.neoforged.moddev' version '2.0.140'
}

version = mod_version
group = mod_group_id

repositories {
    mavenLocal()
    mavenCentral()
    maven {
        name = "TerraformersMC"
        url = "https://maven.terraformersmc.com/releases/"
        content {
            includeGroup "dev.emi"
        }
    }
    maven {
        url = "https://modmaven.dev/"
        content {
            includeGroup "de.mari_023"
            includeGroup "dev.technici4n"
            includeGroup "mekanism"
        }
    }
    maven {
        name = "Curios"
        url = "https://maven.theillusivec4.top/"
    }
    maven {
        url = "https://raw.githubusercontent.com/Fuzss/modresources/main/maven/"
    }
    maven {
        url = "https://maven.createmod.net"
    }
    maven {
        url = "https://www.cursemaven.com"
        content {
            includeGroup "curse.maven"
        }
    }
}

base {
    archivesName = mod_id
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

// JDB-only helpers are available to development runs, but are intentionally
// excluded from the published mod jar.
sourceSets {
    jdb {
        java.srcDir 'src/jdb/java'
        compileClasspath += sourceSets.main.output + sourceSets.main.compileClasspath
        runtimeClasspath += output + sourceSets.main.runtimeClasspath
    }
}

configurations {
    jdbImplementation.extendsFrom implementation
    jdbCompileOnly.extendsFrom compileOnly
    jdbRuntimeOnly.extendsFrom runtimeOnly
}

neoForge {
    // Specify the version of NeoForge to use.
    version = project.neo_version

    parchment {
        mappingsVersion = project.parchment_mappings_version
        minecraftVersion = project.parchment_minecraft_version
    }

    // This line is optional. Access Transformers are automatically detected
    // accessTransformers.add('src/main/resources/META-INF/accesstransformer.cfg')

    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
        client {
            client()
            if (System.getProperty('os.name').toLowerCase().contains('mac')) {
                jvmArguments.addAll '-Xdock:name=Minecraft AE2LT Dev', '-Dapple.awt.application.name=Minecraft AE2LT Dev'
            }

            // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id

            // Profiling-only: uncomment to force HotSpot to NOT inline the hot-path
            // methods that tickNormal calls directly, so a spark sampler can break
            // out their individual self-time. Off by default — leaving these args
            // on adds 1-2 µs of method-dispatch overhead per tickNormal call (no
            // free lunch). See dev-profiling.compilecommands for the per-method
            // list and a longer explanation.
            // jvmArguments.addAll(
            //     '-XX:+UnlockDiagnosticVMOptions',
            //     "-XX:CompileCommandFile=${project.file('dev-profiling.compilecommands').absolutePath}".toString()
            // )
        }

        // Second dev client for local multiplayer testing — runs as
        // "Dev2" with an isolated game directory so options.txt /
        // saves / resource packs don't collide with the primary client.
        // Launch via `./gradlew runClient2`; the primary client opens
        // the world to LAN and this one joins via localhost.
        client2 {
            client()
            programArguments.addAll '--username', 'Dev2'
            gameDirectory = project.file('run2')
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id

            // Same profiling overrides as `client` — see comment there.
            // jvmArguments.addAll(
            //     '-XX:+UnlockDiagnosticVMOptions',
            //     "-XX:CompileCommandFile=${project.file('dev-profiling.compilecommands').absolutePath}".toString()
            // )
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        // This run config launches GameTestServer and runs all registered gametests, then exits.
        // By default, the server will crash when no gametests are provided.
        // The gametest system is also enabled by default for other run configs under the /test command.
        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            data()

            // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
            // gameDirectory = project.file('run-data')

            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        // applies to all the run configs above
        configureEach {
            // Recommended logging data for a userdev environment
            // The markers can be added/remove as needed separated by commas.
            // "SCAN": For mods scan.
            // "REGISTRIES": For firing of registry events.
            // "REGISTRYDUMP": For getting the contents of all registries.
            systemProperty 'forge.logging.markers', 'REGISTRIES'

            // Recommended logging level for the console
            // You can set various levels here.
            // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        // define mod <-> source bindings
        // these are used to tell the game which sources are for which mod
        // mostly optional in a single mod project
        // but multi mod projects should define one per mod
        "${mod_id}" {
            sourceSet(sourceSets.main)
            sourceSet(sourceSets.jdb)
        }
    }

}

// Include resources generated by data generators.
sourceSets.main.resources { srcDir 'src/generated/resources' }
sourceSets.test.compileClasspath += sourceSets.main.compileClasspath
sourceSets.test.runtimeClasspath += sourceSets.main.runtimeClasspath

// Optional real-mod jars for JDB integration probes. Kept opt-in so normal builds and
// published artifacts never depend on machine-local modpack paths.
def jdbProbeModPaths = providers.gradleProperty('ae2ltJdbProbeMods')
        .getOrElse('')
        .split(java.io.File.pathSeparator)
        .findAll { !it.isBlank() }

dependencies {
    // Thunderbolt Core — the extracted AE2 infrastructure layer (fast crafting planner,
    // channel/batch/cell/matrix algorithms). Provided at runtime as a separate mod jar in the modpack,
    // so compileOnly here. Published to mavenLocal via `./gradlew publishToMavenLocal` in Thunderbolt Core.
    compileOnly "com.moakiee.thunderbolt:thunderbolt:2.0.1"
    runtimeOnly "com.moakiee.thunderbolt:thunderbolt:2.0.1"
    testRuntimeOnly "com.moakiee.thunderbolt:thunderbolt:2.0.1"
    jdbProbeModPaths.each { runtimeOnly files(it) }

    implementation "curse.maven:applied-energistics-2-223794:7027323"
    implementation "de.mari_023:ae2wtlib_api:${ae2wtlib_version}"
    compileOnly "top.theillusivec4.curios:curios-neoforge:${curios_version}:api"
    runtimeOnly "top.theillusivec4.curios:curios-neoforge:${curios_version}"
    runtimeOnly("de.mari_023:ae2wtlib:${ae2wtlib_version}") {
        transitive = false
    }
    runtimeOnly "org.appliedenergistics:guideme:${guideme_version}"
    compileOnly "curse.maven:jei-238222:7391682"
    runtimeOnly "curse.maven:jei-238222:7391682"
    compileOnly "dev.emi:emi-neoforge:1.1.10+1.21"
    compileOnly "curse.maven:jade-324717:6291517"
    runtimeOnly "curse.maven:jade-324717:6291517"
    runtimeOnly "curse.maven:mekanism-268560:7621971"
    runtimeOnly "curse.maven:mekanism-generators-268566:7621974"
    compileOnly "curse.maven:extendedae-892005:7727948"
    runtimeOnly "curse.maven:extendedae-892005:7727948"
    compileOnly "curse.maven:glodium-957920:5821676"
    runtimeOnly "curse.maven:glodium-957920:5821676"
    compileOnly "curse.maven:advancedae-1084104:7668664"
    runtimeOnly "curse.maven:advancedae-1084104:7668664"
    runtimeOnly "curse.maven:geckolib-388172:7707149"
    compileOnly "curse.maven:applied-flux-965012:7429565"
    runtimeOnly "curse.maven:applied-flux-965012:7429565"
    compileOnly "dev.technici4n:GrandPower:3.0.0"
    compileOnly "mekanism:Mekanism:1.21.1-10.7.15.81"
    compileOnly "curse.maven:flux-networks-248020:6089446"
    compileOnly "curse.maven:ae2-jei-integration-1074338:7727898"
    runtimeOnly "curse.maven:ae2-jei-integration-1074338:7727898"
    runtimeOnly "curse.maven:applied-mekanistics-574300:7096962"
    runtimeOnly "curse.maven:mekanism-extras-1026040:7628313"
    runtimeOnly "curse.maven:just-enough-characters-250702:7320033"
    runtimeOnly "curse.maven:building-gadgets-298187:6850515"
    runtimeOnly "curse.maven:ftb-ultimine-forge-386134:7570482"
    runtimeOnly "curse.maven:ftb-library-forge-404465:7746959"
    runtimeOnly "curse.maven:architectury-api-419699:5786327"
    runtimeOnly "curse.maven:spark-361579:6225208"
    runtimeOnly "curse.maven:construction-sticks-1156098:7687867"
    runtimeOnly "curse.maven:toms-storage-378609:7659872"
    runtimeOnly "curse.maven:kubejs-238086:7278501"
    runtimeOnly "curse.maven:rhino-416294:7104526"

    // Runtime boss/execution compatibility probes.
    runtimeOnly "curse.maven:mmmmmmmmmmmm-225738:7943676"
    runtimeOnly "curse.maven:selene-499980:7928091"
    runtimeOnly "curse.maven:codechicken-lib-1-8-242818:7281427"
    runtimeOnly "curse.maven:brandons-core-231382:7130990"
    runtimeOnly "curse.maven:draconic-evolution-223565:7584459"

    runtimeOnly files("libs/observable-5.4.4.jar")
    runtimeOnly "curse.maven:kotlin-for-forge-351264:7471280"

    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher"

    // Example mod dependency with JEI
    // The JEI API is declared for compile time use, while the full JEI artifact is used at runtime
    // compileOnly "mezz.jei:jei-${mc_version}-common-api:${jei_version}"
    // compileOnly "mezz.jei:jei-${mc_version}-forge-api:${jei_version}"
    // runtimeOnly "mezz.jei:jei-${mc_version}-forge:${jei_version}"

    // Example mod dependency using a mod jar from ./libs with a flat dir repository
    // This maps to ./libs/coolmod-${mc_version}-${coolmod_version}.jar
    // The group id is ignored when searching -- in this case, it is "blank"
    // implementation "blank:coolmod-${mc_version}:${coolmod_version}"

    // Example mod dependency using a file as dependency
    // implementation files("libs/coolmod-${mc_version}-${coolmod_version}.jar")

    // Example project dependency using a sister or child project:
    // implementation project(":myproject")

    // For more info:
    // http://www.gradle.org/docs/current/userguide/artifact_dependencies_tutorial.html
    // http://www.gradle.org/docs/current/userguide/dependency_management.html
}

tasks.named('test', Test) {
    useJUnitPlatform()
}

// Keep the source and adapted third-party licensing notices inside every published mod jar.
tasks.named('jar', Jar) {
    from('LICENSE') {
        into 'META-INF'
    }
    from('THIRD_PARTY_NOTICES.md') {
        into 'META-INF'
    }
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [minecraft_version      : minecraft_version,
                             minecraft_version_range: minecraft_version_range,
                             neo_version            : neo_version,
                             neo_version_range      : neo_version_range,
                             loader_version_range   : loader_version_range,
                             mod_id                 : mod_id,
                             mod_name               : mod_name,
                             mod_license            : mod_license,
                             mod_version            : mod_version,
                             mod_authors            : mod_authors,
                             mod_description        : mod_description]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}

// Include the output of "generateModMetadata" as an input directory for the build
// this works with both building through Gradle and the IDE.
sourceSets.main.resources.srcDir generateModMetadata
// To avoid having to run "generateModMetadata" manually, make it run on every project reload
neoForge.ideSyncTask generateModMetadata

// Example configuration to allow publishing using the maven-publish plugin
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
